sentence=Deterministic event comparison engine for embedded systems with cycle-synchronous semantics.
paragraph=Hestia-Compare provides a lightweight, allocation-free event engine for old/new comparisons in deterministic firmware loops. It supports stateful detectors (diff, rise, fall, thresholds, hysteresis, range violations) for bools, integers, floats and strings, with explicit write/decision phases and latched events. Designed to pair with HestiaTempo and finite-state logic in Arduino and ESP32 projects.
